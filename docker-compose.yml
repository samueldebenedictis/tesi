services:
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  app:
    image: node:lts-alpine3.23
    user: node
    ports:
      - 3000:3000
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: sh -c "npm run build && npm run start"

  playwright:
    user: ubuntu
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    volumes:
      - .:/app
    command: npx playwright test
    network_mode: host
    working_dir: /app